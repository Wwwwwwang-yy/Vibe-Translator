# Render 部署配置（Web Service + 静态站点）
# 文档：https://render.com/docs/blueprint-spec

services:
  # 后端 API 服务
  - type: web
    name: vibetrans-api
    runtime: node
    plan: free
    region: singapore
    rootDir: .
    buildCommand: npm install
    startCommand: node server/server.js
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: DEFAULT_TRANSLATOR
        value: mymemory
      - key: DEFAULT_SOURCE_LANG
        value: en
      - key: DEFAULT_TARGET_LANG
        value: zh
      - key: PUBLIC_WHISPER_MODEL
        value: Xenova/whisper-tiny
      - key: PUBLIC_WHISPER_CDN
        value: https://cdn.jsdelivr.net/npm
      - key: PUBLIC_VOSK_CDN
        value: https://cdn.jsdelivr.net/npm/vosk-browser@0.0.8/dist
      # 以下密钥在 Render 控制台中手动填写
      - key: BAIDU_APP_ID
        sync: false
      - key: BAIDU_SECRET_KEY
        sync: false
      - key: LIBRETRANSLATE_API_KEY
        sync: false
      - key: DEEPL_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: YOUDAO_APP_KEY
        sync: false
      - key: YOUDAO_APP_SECRET
        sync: false
      - key: HF_API_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false

  # 前端静态站点（可选：如果前后端分仓部署）
  - type: web
    name: vibetrans-static
    runtime: static
    rootDir: .
    buildCommand: echo "No build step for static site"
    staticPublishPath: .
    pullRequestPreviewsEnabled: false
    routes:
      - type: rewrite
        source: /api/*
        destination: https://vibetrans-api.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_ENV
        value: production
